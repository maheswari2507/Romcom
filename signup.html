<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg,	#ffd2d2 );
            min-height: 100vh;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* =============== IMPROVED NAVBAR =============== */
        .navbar {
            height: 80px;
            width: 100%;
            background: linear-gradient(135deg, 	#da969b);
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Logo styling - circular with shadow */
        .logo {
            height: 55px;
            width: 55px;
            border-radius: 50%;
            margin-right: auto;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: 3px solid white;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Nav links container */
        .nav-links {
            display: flex;
            gap: 40px;
            margin-left: auto;
        }

        /* Individual nav button styling */
        .nav-btn {
            background: none;
            border: none;
            color:#fffcfb;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        /* Underline animation on hover */
        .nav-btn::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 3px;
            background: white;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
        }

        .nav-btn:hover::after {
            width: 100%;
        }

        /* =============== IMPROVED CENTER BOX =============== */
        .mainbox {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 30px 20px;
        }

        .centerbox {
            background:	#faebd7;
            padding: 50px 45px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header section */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header-icon {
            font-size: 45px;
            margin-bottom: 15px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Main heading with gradient */


        .subtitle {
            color: #999;
            font-size: 14px;
            font-weight: 500;
        }

        /* Form styling */
        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Input fields */
        input {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }

        input::placeholder {
            color: #bbb;
        }

        input:focus {
            outline: none;
            border-color: #ea66d6;
          
            box-shadow: 0 0 0 4px rgba(234, 102, 214, 0.15);
            transform: translateY(-5px);
        }

        /* Button container */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        /* Button base styling */
        button {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
           
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        /* OTP button */
        .btn-otp {
            background: linear-gradient(#da969b);
            color: white;
            box-shadow: 0 8px 20px rgba(207, 208, 211, 0.3);
        }

        .btn-otp:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
        }

        /* Sign Up button */
        .btn-signup {
            background: linear-gradient(#da969b);
            color: white;
            box-shadow: 0 8px 20px rgba(197, 193, 196, 0.3);
        }

        .btn-signup:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(234, 102, 214, 0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

    
        #message {
            text-align: center;
            margin-top: 20px;
            font-weight: 600;
            min-height: 20px;
            font-size: 14px;
            animation: fadeIn 0.3s ease-in;
        }

.message.success {
    color: green;
}

.message.error {
    color: red;
}

        /* Divider */
        .divider {
            text-align: center;
            margin: 25px 0;
            color: #ddd;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* Login link */
        .login-link {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #ea66d6;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        /* Responsive design */
        @media (max-width: 600px) {
            .navbar {
                padding: 0 20px;
                height: 70px;
            }

            .logo {
                height: 45px;
                width: 45px;
            }

            .nav-links {
                gap: 20px;
            }

            .nav-btn {
                font-size: 14px;
            }

            .centerbox {
                padding: 35px 25px;
            }

            h1 {
                font-size: 26px;
            }

            .button-group {
                flex-direction: column;
            }

            .mainbox {
                min-height: calc(100vh - 70px);
            }
        }
    </style>
</head>

<body>
    <!-- =============== IMPROVED NAVBAR =============== -->
    <div class="navbar">
        <img class="logo" src="logo.png" alt="Logo">
        <div class="nav-links">
            <a href="#" class="nav-btn">Home</a>
            <a href="#" class="nav-btn">About</a>
            <a href="#" class="nav-btn">Services</a>
            <a href="#" class="nav-btn">Contact</a>
        </div>
    </div>

    <!-- =============== IMPROVED CENTER BOX =============== -->
    <div class="mainbox">
        <div class="centerbox">
            <div class="header">
                <div class="header-icon">✨</div>
                <h2>Create Account</h2>
                <p class="subtitle">Join us today and get started</p>
            </div>

            <form onsubmit="handleSignUp(event)">
                <div class="form-group">
                    <label for="name">👤 Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">📧 Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">🔐 Password</label>
                    <input type="password" id="password" placeholder="Create a strong password" required>
                </div>

                <div class="form-group">
                    <label for="phone">📱 Phone Number</label>
                    <input type="text" id="phone" placeholder="Enter your phone number" required>
                </div>

                <div class="form-group">
                    <label for="otp">🔑 OTP</label>
                    <input type="text" id="otp" placeholder="Enter OTP received" required>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-otp" onclick="sendOTP()">Send OTP</button>
                    <button type="submit" class="btn-signup">Sign Up</button>
                </div>
            </form>

            <p id="message" class="message"></p>

            <div class="divider">OR</div>

            <div class="login-link">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script>
        function sendOTP() {
            const phone = document.getElementById("phone").value.trim();
            const messageDiv = document.getElementById("message");

            if (!phone) {
                messageDiv.textContent = "⚠️ Please enter phone number";
                messageDiv.className = "message error";////
          
                return;
            }

            fetch("http://127.0.0.1:5000/send_otp", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ phone })
            })
            .then(res => res.json())
            .then(data => {
                messageDiv.textContent = "✅ " + data.message;
                messageDiv.className = "message success";
            })
            .catch(error => {
                messageDiv.textContent = "❌ Error sending OTP";
                messageDiv.className = "message error";
            });
        }

        function handleSignUp(event) {
            event.preventDefault();

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const phone = document.getElementById("phone").value.trim();
            const otp = document.getElementById("otp").value.trim();
            const messageDiv = document.getElementById("message");

            if (!name || !email || !password || !phone || !otp) {
                messageDiv.textContent = "⚠️ Please fill all fields";
                messageDiv.className = "message error";
                return;
            }

            fetch("http://127.0.0.1:5000/verify_otp", {//connecting html server,flask(python) server,verify_otp method of python 
                method: "POST",//sending message to backend
                headers: { "Content-Type": "application/json" },//text on website is in the form of string jason "992444442"
                body: JSON.stringify({ name, email, password, phone, otp })//convert  it into javascript usable json object and store the details filled into database 
            })
            .then(res => res.json())//if you get a response from the backend server do this
            .then(data => {
                if (data.message.includes("successfully")) {
                    messageDiv.textContent = "✅ " + data.message;//data.message we get from the python backend
                    messageDiv.className = "message success";
                    document.querySelector("form").reset();
                } else {
                    messageDiv.textContent = "❌ " + data.message;
                    messageDiv.className = "message error";
                }
            })
            .catch(error => {
                messageDiv.textContent = "❌ Registration failed";
                messageDiv.className = "message error";
            });
        }
    </script>
</body>
</html>
