<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(#ffd2d2);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
        }

        /* ===== NAVBAR — exact same as recommendations page ===== */
        .navbar {
            height: 70px;
            background: #ffb3b3 !important;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: 700;
            margin-right: auto;
            background: #ca7f68;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: #ca7f68;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #ca7f68 !important;
            color: white !important;
            text-decoration: none;
            font-size: 15px;
        }

        .nav-btn:hover {
            background: #8b5a4c !important;
            transform: translateY(-2px);
        }

        /* ===== LOGIN CONTAINER ===== */
        .container {
            background: #faebd7;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: rgb(112, 109, 109);
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: rgb(112, 109, 109);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffb3b3;
            border-radius: 5px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #ca7f68;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: linear-gradient(#da969b);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        #login_result {
            text-align: center;
            margin-top: 20px;
            font-weight: 500;
            min-height: 20px;
        }

        .message.success {
            color: green;
        }

        .message.error {
            color: red;
        }

        /* Sign up prompt inside box */
        .signup-prompt {
            text-align: center;
            margin-top: 22px;
            color: rgb(140, 130, 130);
            font-size: 14.5px;
        }

        .signup-prompt a {
            color: #c06b6b;
            font-weight: 700;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .signup-prompt a:hover {
            color: #a04545;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- NAVBAR — same style as recommendations page -->
    <nav class="navbar">
        <div class="navbar-brand">🎬 RomCom</div>
        <div class="nav-buttons">
            <a href="/" class="nav-btn">Home</a>
            <a href="/signup-page" class="nav-btn">Sign Up</a>
        </div>
    </nav>

    <!-- LOGIN BOX -->
    <div class="container">
        <h1>Login</h1>

        <form onsubmit="loginUser(event)">
            <div class="form-group">
                <label for="login_phone">Phone Number</label>
                <input type="text" id="login_phone" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label for="login_password">Password</label>
                <input type="password" id="login_password" placeholder="Enter your password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <p id="login_result"></p>

        <!-- Sign up link inside box too -->
        <div class="signup-prompt">
            Don't have an account? <a href="/signup-page">Sign Up</a>
        </div>
    </div>

    <script>
        async function loginUser(event) {
            event.preventDefault();

            const phone = document.getElementById("login_phone").value.trim();
            const password = document.getElementById("login_password").value;
            const resultDiv = document.getElementById("login_result");

            if (!phone || !password) {
                resultDiv.textContent = "Please fill all fields";
                resultDiv.className = "error";
                return;
            }

            try {
                const response = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone, password })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.textContent = data.message;
                    resultDiv.className = "success";

                    localStorage.setItem('userPhone', phone);

                    window.location.href = "/preferences-page";
                } else {
                    resultDiv.textContent = data.message;
                    resultDiv.className = "error";
                }
            } catch (error) {
                resultDiv.textContent = "Connection error. Please try again.";
                resultDiv.className = "error";
                console.error(error);
            }
        }
    </script>
</body>

</html>
