<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Favorite Romance Tropes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffd2d2 0%, #ffe5e5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            height: 80px;
            width: 100%;
            background: linear-gradient(135deg, #da969b);
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            height: 55px;
            width: 55px;
            border-radius: 50%;
            margin-right: auto;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: 3px solid white;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            margin-left: auto;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #fffcfb;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 3px;
            background: white;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
        }

        .nav-btn:hover::after {
            width: 100%;
        }

        .container {
            flex: 1;
            padding: 50px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: rgb(112, 109, 109);
            font-size: 36px;
            margin-bottom: 15px;
        }

        .subtitle {
            text-align: center;
            color: rgb(150, 130, 130);
            font-size: 18px;
            margin-bottom: 40px;
        }

        .tropes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .trope-card {
            background: white;
            border: 3px solid #ffb3b3;
            border-radius: 10px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .trope-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .trope-card input[type="checkbox"] {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #da969b;
        }

        .trope-card.selected {
            background: #faebd7;
            border-color: #da969b;
            box-shadow: 0 8px 25px rgba(218, 150, 155, 0.3);
        }

        .trope-title {
            font-size: 20px;
            font-weight: 700;
            color: #8b6d6d;
            margin-bottom: 10px;
            padding-right: 35px;
        }

        .trope-description {
            font-size: 14px;
            color: #a08f8f;
            line-height: 1.6;
        }

        .emoji {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 40px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .save-btn {
            background:  #c97f7f ;
            color: white;
            min-width: 150px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(218, 150, 155, 0.4);
        }

        .save-btn:active {
            transform: translateY(0);
        }

        .reset-btn {
            background: #f0d9d9;
            color: #8b6d6d;
            border: 2px solid #da969b;
            min-width: 150px;
        }

        .reset-btn:hover {
            background: #e8c5c5;
            transform: translateY(-2px);
        }

        #result-message {
            text-align: center;
            margin-top: 20px;
            font-weight: 500;
            font-size: 16px;
            min-height: 25px;
        }

        .result-message.success {
            color: green;
        }

        .result-message.error {
            color: red;
        }

        .result-message.loading {
            color: #da969b;
        }

        .selection-counter {
            text-align: center;
            color: #8b6d6d;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #da969b;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎬 Choose Your Favorite Romance Tropes</h1>
        <p class="subtitle">Complete your profile to get personalized movie recommendations</p>

        <div class="selection-counter">
            <span id="selected-count">0</span> tropes selected
        </div>

        <div class="tropes-grid" id="tropesContainer"></div>

        <div class="button-group">
         <a href="main.html" > <button class="save-btn" onclick="savePreferences()">Continue to Home</button></a>
            <button class="reset-btn" onclick="resetSelections()">Clear Selections</button>
        </div>

        <p id="result-message"></p>
    </div>

    <script>
        const tropes = [
            {
                title: "Enemies to Lovers",
                description: "Two characters start as rivals or enemies, but slowly fall in love as they understand each other better.",
                emoji: "💔➡️💕"
            },
            {
                title: "Opposites Attract",
                description: "Characters with completely different personalities and backgrounds find love in their differences.",
                emoji: "🌙☀️"
            },
            {
                title: "Forced Proximity",
                description: "Characters are forced to spend time together, leading to unexpected romantic feelings.",
                emoji: "🏠💕"
            },
            {
                title: "Slow Burn",
                description: "A gradual, emotional build-up of feelings over time before romance finally blossoms.",
                emoji: "🔥⏰"
            },
            {
                title: "Fake Dating",
                description: "Characters pretend to be in a relationship, but real feelings develop along the way.",
                emoji: "🎭❤️"
            },
            {
                title: "Second Chance Romance",
                description: "Former lovers reunite and get another chance at love after time apart.",
                emoji: "🔄💑"
            },
            {
                title: "Friends to Lovers",
                description: "Best friends realize their friendship has deeper romantic feelings underneath.",
                emoji: "👯💕"
            },
            {
                title: "Forbidden Love",
                description: "Characters fall in love despite obstacles or rules that try to keep them apart.",
                emoji: "🚫❤️"
            },
            {
                title: "Grumpy/Sunshine",
                description: "A pessimistic, grumpy character is softened by an optimistic, cheerful character.",
                emoji: "😤☀️"
            },
            {
                title: "Workplace Romance",
                description: "Colleagues navigate professional relationships while falling in love.",
                emoji: "💼💕"
            },
            {
                title: "Fake Marriage",
                description: "Characters marry for practical reasons, but real love develops through the marriage.",
                emoji: "💍💫"
            },
            {
                title: "Star-Crossed Lovers",
                description: "Two people from conflicting backgrounds or circumstances love against the odds.",
                emoji: "⭐💔"
            }
        ];

        // ===== CHANGE #1: GET USER ID FROM LOCALSTORAGE =====
       let currentUserId = localStorage.getItem('userPhone');
if (!currentUserId) {
    alert("Please login again");
    window.location.href = "login.html";
}

        console.log('Current User ID:', currentUserId);

        // Initialize the tropes grid
        function initializeTropes() {
            const container = document.getElementById("tropesContainer");
            tropes.forEach((trope, index) => {
                const card = document.createElement("div");
                card.className = "trope-card";
                card.innerHTML = `
                    <input type="checkbox" id="trope-${index}" onchange="updateSelection()">
                    <div class="emoji">${trope.emoji}</div>
                    <div class="trope-title">${trope.title}</div>
                    <div class="trope-description">${trope.description}</div>
                `;
                card.onclick = () => {
                    const checkbox = card.querySelector("input");
                    checkbox.checked = !checkbox.checked;
                    updateSelection();
                };
                container.appendChild(card);
            });

            // ===== CHANGE #2: LOAD EXISTING PREFERENCES =====
            loadExistingPreferences();
        }

        function updateSelection() {
            const cards = document.querySelectorAll(".trope-card");
            const checkboxes = document.querySelectorAll("input[type='checkbox']");
            let count = 0;

            checkboxes.forEach((checkbox, index) => {
                if (checkbox.checked) {
                    cards[index].classList.add("selected");
                    count++;
                } else {
                    cards[index].classList.remove("selected");
                }
            });

            document.getElementById("selected-count").textContent = count;
        }

        // ===== CHANGE #3: LOAD PREFERENCES FROM DATABASE =====
        async function loadExistingPreferences() {
            try {
                const response = await fetch(`http://localhost:5000/get-preferences/${currentUserId}`);
                
                if (response.ok) {
                    const data = await response.json();
                    const savedTropes = data.data.tropes;
                    
                    console.log("✅ Loaded saved preferences:", savedTropes);
                    
                    // Check the boxes for saved tropes
                    const checkboxes = document.querySelectorAll("input[type='checkbox']");
                    checkboxes.forEach((checkbox, index) => {
                        if (savedTropes.includes(tropes[index].title)) {
                            checkbox.checked = true;
                        }
                    });
                    
                    updateSelection();
                    showMessage("✅ Loaded your saved preferences!", "success");
                    setTimeout(() => showMessage("", ""), 2000);
                } else {
                    console.log("⚠️ No saved preferences found for this user");
                }
            } catch (error) {
                console.log("⚠️ No saved preferences or connection error:", error);
            }
        }

        async function savePreferences() {
            const checkboxes = document.querySelectorAll("input[type='checkbox']");
            const selectedTropes = [];

            checkboxes.forEach((checkbox, index) => {
                if (checkbox.checked) {
                    selectedTropes.push(tropes[index].title);
                }
            });

            if (selectedTropes.length === 0) {
                showMessage("Please select at least one trope", "error");
                return;
            }

            showMessage('<span class="loading-spinner"></span>Saving preferences...', "loading");

            try {
                // ===== UPDATED: SEND USER_ID WITH PREFERENCES =====
                const response = await fetch("http://localhost:5000/save-preferences", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        user_id: currentUserId,  // ✅ Include phone number as user_id
                        tropes: selectedTropes   // ✅ Array of trope names
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage("Preferences saved! Redirecting to home... 🎉", "success");
                    console.log("✅ Saved preferences:", data.data);
                    setTimeout(() => {
    window.location.href = "main.html";
}, 800);

                  
                } else {
                    showMessage(data.message || "Error saving preferences", "error");
                    console.error("❌ Save error:", data);
                }
            } catch (error) {
                showMessage("Connection error. Make sure Flask server is running on port 5000", "error");
                console.error("❌ Connection error:", error);
            }
        }

        function resetSelections() {
            document.querySelectorAll("input[type='checkbox']").forEach(checkbox => {
                checkbox.checked = false;
            });
            updateSelection();
            showMessage("Selections cleared!", "success");
            setTimeout(() => showMessage("", ""), 2000);
        }

        function showMessage(message, type) {
            const resultDiv = document.getElementById("result-message");
            resultDiv.innerHTML = message;
            resultDiv.className = type ? `result-message ${type}` : "";
        }

        // Initialize on page load
        window.addEventListener("DOMContentLoaded", initializeTropes);
    </script>
</body>
</html>
