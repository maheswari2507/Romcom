<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

     body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(#ffd2d2);
    min-height: 100vh;
    display: flex;
    flex-direction: column;   /* 👈 IMPORTANT */
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
}

                .navbar {
            height: 80px;
            width: 100%;
            background: linear-gradient(135deg, 	#da969b);
            display: flex;
            align-items: center;
            padding: 0 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Logo styling - circular with shadow */
        .logo {
            height: 55px;
            width: 55px;
            border-radius: 50%;
            margin-right: auto;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: 3px solid white;
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Nav links container */
        .nav-links {
            display: flex;
            gap: 40px;
            margin-left: auto;
        }

        /* Individual nav button styling */
        .nav-btn {
            background: none;
            border: none;
            color:#fffcfb;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        /* Underline animation on hover */
        .nav-btn::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 3px;
            background: white;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
        }

        .nav-btn:hover::after {
            width: 100%;
        }

        .container {
            background:	#faebd7;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
                margin: auto;   
        }

        h1 {
            text-align: center;
            color:rgb(112, 109, 109);
          
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: rgb(112, 109, 109);
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffb3b3;
            border-radius: 5px;
            font-size: 16px;
         
        }

        input:focus {
            outline: none;
            border-color: 	#ca7f68;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(#da969b);
            color: white;
            border: none;
            border-radius: 5px;
            border-color: #faebd7;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #login_result {
            text-align: center;
            margin-top: 20px;
            font-weight: 500;
            min-height: 20px;
        }
        .message.success {
    color: green;
}

.message.error {
    color: red;
}


    </style>
</head>
<body>
    <div class="navbar">
        <img class="logo" src="logo.png" alt="Logo">
        <div class="nav-links">
            <a href="#" class="nav-btn">Home</a>
            <a href="#" class="nav-btn">About</a>
            <a href="#" class="nav-btn">Services</a>
            <a href="#" class="nav-btn">Contact</a>
        </div>
    </div>

    <div class="container">
        <h1 >Login</h1>
        
        <form onsubmit="loginUser(event)">
            <div class="form-group">
                <label for="login_phone">Phone Number</label>
                <input type="text" id="login_phone" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label for="login_password">Password</label>
                <input type="password" id="login_password" placeholder="Enter your password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <p id="login_result"></p>
    </div>

    <script>
        async function loginUser(event) {
            event.preventDefault();

            const phone = document.getElementById("login_phone").value.trim();
            const password = document.getElementById("login_password").value;
            const resultDiv = document.getElementById("login_result");

            if (!phone || !password) {
                resultDiv.textContent = "Please fill all fields";
                resultDiv.className = "error";
                return;
            }

            try {
                const response = await fetch("http://localhost:5000/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone, password })
                });

                const data = await response.json();

                
            if (response.ok) {
            resultDiv.textContent = data.message;
            resultDiv.className = "success";
            document.getElementById("login_phone").value = "";
            document.getElementById("login_password").value = "";

              localStorage.setItem('userPhone', phone);  //USER PHONE FROM HERE WE ARE GEETING IN THE PREFERENCES PAGE LIKE FOR ID WHICH IS A PHONE NUMBER FROM HERE TO SAVE PREFERENCES
        console.log("✅ Saved phone to localStorage:", phone);
        
        window.location.href = 'preferences.html';
            
            // ADD THIS: Redirect to preferences after 1 second
            setTimeout(() => {
                window.location.href = "preferences.html";
            }, 1000);
        } else {
            resultDiv.textContent = data.message;
            resultDiv.className = "error";
        }
    } catch (error) {
        resultDiv.textContent = "Connection error. Please try again.";
        resultDiv.className = "error";
        console.error(error);
    }
        }
    </script>
</body>
</html>
